name: Build pull request on push

on:
  push:
    branches:
      - develop
  pull_request:
    paths: ['**']
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  pull-requests: read

# Cancel previous jobs if PR gets another push
concurrency:
  group: PR-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'build')
    runs-on: ubuntu-latest
    env:
      VERSION_SUFFIX: "PR-${{ github.event.number }}"
    steps:
      - uses: actions/checkout@v4
      - run: git fetch origin develop --no-tags --depth=1
      - name: Check Path Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - '*.gradle'
              - 'gradle.properties'
              - 'gradlew*'
              - 'gradle/**'
      - name: Setup Build
        if: steps.filter.outputs.code == 'true'
        uses: ./.github/actions/build_setup
      - name: Build
        if: steps.filter.outputs.code == 'true'
        run: ./gradlew assemble
      - name: Rename Jars
        if: steps.filter.outputs.code == 'true'
        run: for file in build/libs/*; do mv "$file" "${file/.jar/-${{ env.VERSION_SUFFIX }}.jar}"; done;
      - name: Upload All Artifacts
        if: steps.filter.outputs.code == 'true'
        uses: actions/upload-artifact@v4.0.0
        with:
          name: Full Package
          path: build/libs/*
          retention-days: 15
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BRANCH_NAME: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          # Only send notification if webhook URL is provided
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "⚠️ Discord webhook URL not provided, skipping notification"
            exit 0
          fi

          # Calculate expiry date (retention-days from now)
          EXPIRY_DATE=$(date -u -d "+30 days" "+%Y-%m-%dT%H:%M:%SZ" 2>/dev/null || date -u -v+30d "+%Y-%m-%dT%H:%M:%SZ")
          EXPIRY_UNIX=$(date -u -d "+30 days" "+%s" 2>/dev/null || date -u -v+30d "+%s")
          
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ARTIFACT_NAME="Star Technology-1.20.1-${{ env.BRANCH_NAME }}"

          RESPONSE=$(curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Build Ready: ${ARTIFACT_NAME}\",
                \"description\": \"A new build has been compiled and uploaded.\",
                \"color\": 5763719,
                \"fields\": [
                  {
                    \"name\": \"📦 Download Artifact\",
                    \"value\": \"[View on GitHub Actions](${RUN_URL})\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"⏳ Expires\",
                    \"value\": \"<t:${EXPIRY_UNIX}:F> (<t:${EXPIRY_UNIX}:R>)\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"🌿 Branch\",
                    \"value\": \"\`${{ env.BRANCH_NAME }}\`\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"🔁 Run\",
                    \"value\": \"[#${{ github.run_number }}](${RUN_URL})\",
                    \"inline\": true
                  }
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" -w "\n%{http_code}")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          if [ "$HTTP_CODE" = "204" ]; then
            echo "✅ Discord notification sent successfully"
          else
            echo "❌ Failed to send Discord notification (HTTP $HTTP_CODE)"
            echo "Response: $(echo "$RESPONSE" | head -n-1)"
            exit 1
          fi
          
      - name: Upload Main Jar
        if: steps.filter.outputs.code == 'true'
        uses: actions/upload-artifact@v4.0.0
        with:
          name: Main Jar
          path: build/libs/*[0-9]-PR-*.jar
          retention-days: 15
