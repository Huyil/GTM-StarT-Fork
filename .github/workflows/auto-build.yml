name: Latest Build

on:
  push:
    branches: [develop]
    paths: ['src/**', '**/*.gradle', 'gradle.properties']

concurrency:
  group: auto-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      PUBLISH: ${{ !contains(github.event.commits[0].message, '[no-snapshot]') }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      SNAPSHOT: true
      CI: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: git fetch origin main --no-tags --depth=1
      - name: Setup Build
        uses: ./.github/actions/build_setup
      - name: Get Mod Version
        id: ver
        run: echo "version=$(./gradlew -q printVersion)" >> $GITHUB_OUTPUT
      - name: Version Suffix
        id: suffix
        run: echo "VERSION_SUFFIX=$(echo "${{ github.sha }}" | cut -c 1-7)" >> $GITHUB_ENV
      - name: Build
        run: ./gradlew build
      - name: Publish to Maven
        if: ${{ github.repository_owner == 'StarT-Dev-Team' && env.PUBLISH == 'true' }}
        run: ./gradlew publish
      - name: Rename Jars
        if: ${{ env.PUBLISH == 'true' }}
        run: for file in build/libs/*; do mv "$file" "${file/SHOT/SHOT+$(date --utc '+%Y%m%d-%H%M%S')-${{ env.VERSION_SUFFIX }}}"; done;
      - name: Upload Artifacts
        if: ${{ env.PUBLISH == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/libs/*
          if-no-files-found: error
          retention-days: 90
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          # Calculate expiry date (retention-days from now)
          EXPIRY_DATE=$(date -u -d "+30 days" "+%Y-%m-%dT%H:%M:%SZ" 2>/dev/null || date -u -v+30d "+%Y-%m-%dT%H:%M:%SZ")
          EXPIRY_UNIX=$(date -u -d "+30 days" "+%s" 2>/dev/null || date -u -v+30d "+%s")
          
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ARTIFACT_NAME="Star Technology-1.20.1-${BRANCH_NAME}"

          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Build Ready: ${ARTIFACT_NAME}\",
                \"description\": \"A new build has been compiled and uploaded.\",
                \"color\": 5763719,
                \"fields\": [
                  {
                    \"name\": \"📦 Download Artifact\",
                    \"value\": \"[View on GitHub Actions](${RUN_URL})\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"⏳ Expires\",
                    \"value\": \"<t:${EXPIRY_UNIX}:F> (<t:${EXPIRY_UNIX}:R>)\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"🌿 Branch\",
                    \"value\": \"\`${BRANCH_NAME}\`\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"🔁 Run\",
                    \"value\": \"[#${{ github.run_number }}](${RUN_URL})\",
                    \"inline\": true
                  }
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"
      - name: Changelog
        id: changelog
        if: ${{ env.PUBLISH == 'true' }}
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configuration: "./.github/json/config-latest.json"
          toTag: ${{ github.ref }}
          fetchViaCommits: true
          failOnError: false
      - name: Release Latest
        if: ${{ env.PUBLISH == 'true' }}
        uses: andelf/nightly-release@46e2d5f80828ecc5c2c3c819eb31186a7cf2156c
        with:
          tag_name: latest-${{ github.ref_name }}
          name: '${{ github.ref_name }}-${{ steps.ver.outputs.version}} SNAPSHOT ${{ env.VERSION_SUFFIX }}'
          prerelease: true
          body: |
            The latest build of GTm StarT Fork.
            Please report any [issues](https://github.com/StarT-Dev-Team/GTM-StarT-Fork/issues).
            ${{ steps.changelog.outputs.changelog }}
          files: build/libs/*.jar
